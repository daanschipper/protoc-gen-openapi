openapi: 3.1.0
info:
  title: helloworld
  description: |-
    ## helloworld.Greeter

    The greeting service definition.
paths:
  /helloworld.Greeter/SayHello:
    get:
      tags:
        - helloworld.Greeter
      summary: SayHello
      description: Sends a greeting
      operationId: helloworld.Greeter.SayHello.get
      parameters:
        - name: message
          in: query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/helloworld.HelloRequest'
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/helloworld.HelloReply'
    post:
      tags:
        - helloworld.Greeter
      summary: SayHello
      description: Sends a greeting
      operationId: helloworld.Greeter.SayHello
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/helloworld.HelloRequest'
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/helloworld.HelloReply'
  /helloworld.Greeter/WriteHello:
    post:
      tags:
        - helloworld.Greeter
      summary: WriteHello
      description: Writes a greeting (has side effects)
      operationId: helloworld.Greeter.WriteHello
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/helloworld.HelloRequest'
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/helloworld.HelloReply'
components:
  schemas:
    helloworld.HelloReply:
      type: object
      properties:
        message:
          type: string
          title: message
      title: HelloReply
      additionalProperties: false
      description: The response message containing the greetings
    helloworld.HelloRequest:
      type: object
      properties:
        name:
          type: string
          title: name
      title: HelloRequest
      additionalProperties: false
      description: The request message containing the user's name.
security: []
tags:
  - name: helloworld.Greeter
    description: The greeting service definition.
